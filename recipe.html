<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">FridgeForager</div>
            <div class="auth-links">
                <a href="signin.html">Sign In</a>
                <a href="getstarted.html" class="get-started">Get Started</a>
            </div>
        </div>
    </header>
    <main>
        <section id="input-section">
            <form id="ingredient-form" action="results.html" method="GET">
                <div class="input-container">
                    <textarea id="ingredients" name="ingredients" placeholder="Enter ingredients (e.g., chicken, rice)"></textarea>
                </div>
                <button type="submit" id="find-recipes">Forage Recipes</button>
            </form>
        </section>
    </main>
    <footer>
        <div class="footer-links">
            <a href="help.html">Help</a>
            <a href="about.html">About</a>
            <a href="privacy.html">Privacy</a>
            <a href="terms.html">Terms</a>
        </div>
    </footer>
    <script src="recipes.js"></script>
</body>
</html>
